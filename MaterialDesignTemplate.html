<!doctype html>
<html lang="nl">
  <head>
    <!-- Vereiste meta tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#56ff56" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home</title>

    <!-- Material.io bestanden (CSS & Font/icons)-->
    <!-- Uitleg werking componenents: https://material.io/components?platform=web -->
    <!-- Demo van components:         https://material-components.github.io/material-components-web-catalog/#/ -->
    <!-- Demo en uitleg icons:        https://fonts.google.com/icons?selected=Material+Icons -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <style>
      :root {
        --mdc-theme-primary: rgb(86, 255, 86);
      }

      body {
        margin: 0;
      }

      body.sheet-open {
        overflow: hidden;
        height: 100vh;
      }

      .mdc-image-list--masonry {
        column-count: 2;
      }

      .sheet {
        position: absolute;
        z-index: 100;
        top: 0;
        width: 100vw;
        margin-left: 0;
        background-color: #2e2e2e;
        transition: 0.3s ease;
      }

      .sheet-out-of-view {
        margin-left: -100%;
      }

      .sheet main {
        min-height: calc(100vh - 56px - 48px);
      }

      .sheet-img {
        width: 100%;
        height: auto;
      }

      footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: var(--mdc-theme-primary);
      }

      .mdc-tab__icon {
        color: white !important;
        position: relative;
      }
    </style>

    <!-- Material.io bestanden (JS en registratie componenten) -->

      const MDCFloatingLabel = mdc.floatingLabel.MDCFloatingLabel;

      const MDCLineRipple = mdc.lineRipple.MDCLineRipple;
      const MDCLinearProgress = mdc.linearProgress.MDCLinearProgress;
      const MDCList = mdc.list.MDCList;
      const MDCMenu = mdc.menu.MDCMenu;
      const MDCMenuSurface = mdc.menuSurface.MDCMenuSurface;
      const MDCNotchedOutline = mdc.notchedOutline.MDCNotchedOutline;
      const MDCRadio = mdc.radio.MDCRadio;
      const MDCRipple = mdc.ripple.MDCRipple;
      const MDCSegmentedButton = mdc.segmentedButton.MDCSegmentedButton;
      const MDCSelect = mdc.select.MDCSelect;
      const MDCSlider = mdc.slider.MDCSlider;
      const MDCSnackbar = mdc.snackbar.MDCSnackbar;
      const MDCSwitch = mdc.switchControl.MDCSwitch;
      const MDCTabBar = mdc.tabBar.MDCTabBar;
      const MDCTextField = mdc.textField.MDCTextField;
      const MDCTooltip = mdc.tooltip.MDCTooltip;
      const MDCTopAppBar = mdc.topAppBar.MDCTopAppBar;
      if ("serviceWorker" in navigator && !navigator.serviceWorker.controller) {
        navigator.serviceWorker.register("/sw.js").then(function (reg) {
          console.log("Service worker registered for scope: " + reg.scope);
        });

  </head>

  <body onload="buildHtml('')">

    <!-- Vanaf hier custom Javascript-->
    <script>
      const listEl = document.querySelector(".mdc-drawer .mdc-list");
      const topAppBarNavIcon = document.querySelector(
        ".mdc-top-app-bar__navigation-icon",
      );
      const mainContentEl = document.querySelector(".main-content");

      //topAppBar
      const topAppBarElement = document.querySelector(".mdc-top-app-bar");
      const topAppBar = new MDCTopAppBar(topAppBarElement);
      //drawer
      const drawerEl = document.querySelector(".mdc-drawer");
      const drawer = MDCDrawer.attachTo(drawerEl);
      //tabbar
      const tabBarEl = document.querySelector(".mdc-tab-bar");
      const tabBar = MDCTabBar.attachTo(tabBarEl);

      const filteredType = "";

      const images = [
        {
          type: "meme",
          src: "https://picsum.photos/300/300?random=1",
        },
        {
          type: "meme",
          src: "https://picsum.photos/300/300?random=1",
        },
        {
          type: "meme",
          src: "https://picsum.photos/300/300?random=1",
        },
        {
          type: "meme",
          src: "https://picsum.photos/300/300?random=2",
        },
        {
          type: "fail",
          src: "https://picsum.photos/300/300?random=3",
        },
        {
          type: "fail",
          src: "https://picsum.photos/300/300?random=4",
        },
        {
          type: "fail",
          src: "https://picsum.photos/300/300?random=5",
        },
        {
          type: "tweet",
          src: "https://picsum.photos/300/300?random=6",
        },
        {
          type: "tweet",
          src: "https://picsum.photos/300/300?random=7",
        },
      ];

      function buildHtml(filteredType) {
        console.log("build html ran");
        let filtered = [];
        if (filteredType != "") {
          filtered = images.filter((img) => img.type === filteredType);
        } else {
          filtered = images;
        }

        const html = filtered
          .map(
            (img) =>
              `
            <li class="mdc-image-list__item">
              <button onclick="ToggleSheet('${img.src}')" style="background: none; border: none; padding: 0; cursor: pointer; width: 100%;">
                <div class="mdc-image-list__image-aspect-container">
                  <img class="mdc-image-list__image" src="${img.src}">
                </div>
              </button>
            </li>
          `,
          )
          .join("");

        document.querySelector(".mdc-image-list").innerHTML = html;
      }

      // Als het open en close sheet geweest was dan had ik simpel weg gewoon de class weggehaald of terug geplaatst bij open/close.
      // Als ik het open:
      // HTMLELEMENT.classList.remove('sheet-out-of-view')
      // Als ik het close:
      // HTMLELEMENT.classList.add('sheet-out-of-view')
      // volle functies:
      function OpenSheet(src) {
        const sheet = document.getElementById("sheet");
        sheet.classList.remove("sheet-out-of-view");
        document.body.classList.add("sheet-open");
      }

      function CloseSheet(src) {
        const sheet = document.getElementById("sheet");
        sheet.classList.add("sheet-out-of-view");
        document.body.classList.remove("sheet-open");
      }

      // Of dit nu werkt heb ik niet getest.

      // De open sheet gaat dan op de image zelf en de close op de close button.
      // Maar ik wou het "Kleiner maken" door toggle te gebruiken. Aangezien het zowat als hetzelfde is.
      // Maar je kan dan niet specifieke logica op open en close toevoegen tenzij je een of andere indicatie meestuurt..

      function pushState(src) {
        window.history.pushState(
          { src: src, timestamp: Date.now() },
          "",
          "#image=" + encodeURIComponent(src),
        );
        console.log("State pushed:", src);
      }

      function ToggleSheet(src) {
        if (src != "") {
          pushState(src);
          document.querySelector(".sheet-img").src = src;
        }
        const sheet = document.getElementById("sheet");
        sheet.classList.toggle("sheet-out-of-view");
        document.body.classList.toggle("sheet-open");
      }

      // Handle browser back button
      window.addEventListener("popstate", (event) => {
        const sheet = document.getElementById("sheet");
        sheet.classList.add("sheet-out-of-view");
        document.body.classList.remove("sheet-open");
      });

      topAppBarNavIcon.addEventListener("click", () => {
        drawer.open = true;
      });

      //sluit menu
      listEl.addEventListener("click", (event) => {
        drawer.open = false;
      });

      //geactiveerde tab loggen
      tabBarEl.addEventListener("MDCTabBar:activated", (event) => {
        const index = event.detail.index;
        console.log(`Tab ${index} is activated`);
      });

      document
        .querySelector(".mdc-top-app-bar__title")
        .addEventListener("click", () => {
          buildHtml("");
          tabBar.activateTab(null);
        });
    </script>
